<html>
    <head>
       <style>
        body {
           
             display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
          #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
             z-index: 200; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
          }
          #task-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; }
          .task-card { 
    width: 100px; 
    height: 100px; 
    cursor: pointer; 
    text-align: center; 
    border-radius: 50%;    
    overflow: hidden;      
    background: #000;     
    transition: 0.2s;
}

.task-card img { 
    width: 100%; 
    height: 100%; 
    object-fit: cover;     
    display: block; 
}


.counter, .task-card div { display: none; }

#timer { font-size: 3rem; margin: 10px; }
#win-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; color: black; z-index: 300; flex-direction: column; align-items: center; justify-content: center; }
@keyframes jitter { 0% { transform: translate(0,0); } 50% { transform: translate(1px, -1px); } 100% { transform: translate(0,0); } }

       </style> 
    </head>
    <body>
        <div id="start-screen">
            <h1>What do you fear?</h1>
             <input type="text" id="fear-input" placeholder="e.g. Someone will get hurt...">
             <br>
             <button onclick="startGame()">Begin</button>

        </div>

        <div id="voice-box" >...</div>
        <div id="timer">00:15</div>
        <div id="task-grid"></div>
         <div id="win-screen">
        <h1>The thoughts were lying.</h1>
        <p id="win-message"></p>
        <p>By ignoring the urges for 10 seconds, you proved the bad thing didn't happen.</p>
        <button onclick="location.reload()">Reset the Cycle</button>
    </div>
    <script>
        function endGame(title, message) {
    gameActive = false;
    clearTimeout(peaceTimeout);

    document.querySelector('#win-screen h1').innerText = title;
    document.getElementById('win-message').innerText = message;
    document.getElementById('win-screen').style.display = 'flex';
}
        let totalActions = 0;
const WIN_TARGET = 10;
        let currentGoal = 0;
        let userFear = "";
        let timeLeft = 15;
        let peaceTimeout;
        let gameActive = false;
        const winDelay = 10000;



        const taskData = [
            { name: "Wash Hands", unfixed: "faucet.png", fixed: "water.png", count: 0},
            { name: "Straighten Picture", unfixed: "piccc.png", fixed: "perf.png", count: 0},
            { name: "Flick switch", unfixed: "off.png", fixed: "on.png", count: 0},
            { name: "Touch plushie", unfixed: "Ted.png", fixed: "heart.png", count: 0},
            { name: "Check lock", unfixed: "openlock.png", fixed: "close.png", count: 0},

        ];
        function startGame(){
            userFear = document.getElementById('fear-input').value|| "the bad thing";
            document.getElementById('start-screen') .style.display = "none";
            gameActive = true;
              initGrid();
            startPeaceTimer();
            runCountdown();
            speakFear();
        }
function initGrid(){
const grid = document.getElementById('task-grid');
            taskData.forEach((data, index) => {
                const card = document.createElement('div');
                card.className = 'task-card';
                card.id = `card-${index}`;
                card.innerHTML = `
                    <img src="${data.unfixed}" id="img-${index}">
                    <div style="font-weight:bold; font-size: 11px; margin-top:5px;">${data.name}</div>
                    <div class="counter" id="count-${index}">Done: 0</div>
                    `;
                      card.onclick = () => performCompulsion(index);
                grid.appendChild(card);
            });
        }
    function performCompulsion(index) {
    if (!gameActive) return;


    if (index !== currentGoal) {
        document.getElementById('voice-box').innerText =
            "WRONG ONE. NOW SOMETHING FEELS OFF.";

        timeLeft = Math.max(3, timeLeft - 2);
        return;
    }


    document.getElementById('voice-box').innerText =
        "GOOD. NOW ONTO THE NEXT ONE.";

    totalActions++;
    taskData[index].count++;


    if (totalActions >= WIN_TARGET) {
        endGame(
    "You fed the loop.",
    `You kept performing the rituals.\n\nBut the relief never lasted.\n\n${userFear} still feels like it could happen.`
);
return;

    
    document.getElementById(`count-${index}`).innerText =
        `Done: ${taskData[index].count}`;

    const img = document.getElementById(`img-${index}`);
    const card = document.getElementById(`card-${index}`);

    img.src = taskData[index].fixed;
    card.style.animation = "none";

    setTimeout(() => {
        if (gameActive) {
            img.src = taskData[index].unfixed;
            card.style.animation = "jitter 0.5s infinite";
        }
    }, 800);

    clearTimeout(peaceTimeout);
    startPeaceTimer();
}
          
function speakFear() {
    if(!gameActive) return;

    
    document.querySelectorAll('.task-card').forEach(c => c.style.borderColor = "#333");

    
    currentGoal = Math.floor(Math.random() * taskData.length);
    const targetName = taskData[currentGoal].name;

    
    const targetCard = document.getElementById(`card-${currentGoal}`);
    if(targetCard) targetCard.style.borderColor = "white";

    const phrases = [
        `If you don't ${targetName.toUpperCase()} right now, ${userFear} will happen.`,
        `You didn't ${targetName} correctly. Do it again or ${userFear} wins.`,
        `The ${targetName} is still wrong. Fix it!`,
        `It's not safe until you ${targetName}. DON'T STOP.`,
        `Just one more time... ${targetName}... or else ${userFear.toUpperCase()}!`
    ];

    document.getElementById('voice-box').innerText = phrases[Math.floor(Math.random() * phrases.length)];
    setTimeout(speakFear, 3000);
}


 

       function runCountdown() {
    const interval = setInterval(() => {
        if (!gameActive) { clearInterval(interval); return; }
        timeLeft--;
        document.getElementById('timer').innerText = `00:${timeLeft < 10 ? '0' + timeLeft : timeLeft}`;
        
        if (timeLeft <= 0) {
    gameActive = false;
    clearInterval(interval);

    document.getElementById('win-message').innerText =
        `Time ran out.\n\nYou didn't do enough to feel safe.\n\n${userFear} still lingers.`;

    document.getElementById('win-screen').style.display = 'flex';
}
    }, 1000);
}
 function startPeaceTimer() {
            peaceTimeout = setTimeout(() => {
                if (gameActive) {
                    gameActive = false;
                    document.getElementById('win-message').innerText = `You resisted the urges for 10 seconds. \n\n${userFear} did not happen. You are safe.`;
                    document.getElementById('win-screen').style.display = 'flex';
                }
            }, winDelay);
        }

    </script>

    </body>
</html>
